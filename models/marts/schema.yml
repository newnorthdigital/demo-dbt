version: 2

models:
  # ── DAILY WEBSITE PERFORMANCE ──────────────────────────────────────────────
  - name: mart_daily_performance
    description: "Daily website performance with traffic attribution, engagement, and ecommerce funnel"
    meta:
      label: "Website Performance"
    columns:
      - name: session_date
        description: "Date of the session"
        meta:
          dimension:
            type: date
            label: "Date"

      - name: session_source
        description: "Traffic source (e.g., google, facebook, direct)"
        meta:
          dimension:
            type: string
            label: "Source"

      - name: session_medium
        description: "Traffic medium (e.g., cpc, organic, referral)"
        meta:
          dimension:
            type: string
            label: "Medium"

      - name: session_campaign
        description: "Campaign name"
        meta:
          dimension:
            type: string
            label: "Campaign"

      - name: session_default_channel_grouping
        description: "Default channel grouping (Paid Search, Organic Search, etc.)"
        meta:
          dimension:
            type: string
            label: "Channel"

      - name: device_category
        description: "Device type (desktop, mobile, tablet)"
        meta:
          dimension:
            type: string
            label: "Device"

      - name: country
        description: "Country of the user"
        meta:
          dimension:
            type: string
            label: "Country"

      - name: landing_page_path
        description: "Landing page URL path"
        meta:
          dimension:
            type: string
            label: "Landing page"

      - name: sessions
        description: "Number of sessions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_sessions:
              type: sum
              label: "Sessions"

      - name: engaged_sessions
        description: "Number of engaged sessions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_engaged_sessions:
              type: sum
              label: "Engaged sessions"
            engagement_rate:
              type: number
              label: "Engagement rate"
              sql: "SAFE_DIVIDE(${total_engaged_sessions}, ${total_sessions})"
              format: "percent"
              round: 1

      - name: revenue
        description: "Transaction revenue in EUR"
        meta:
          dimension:
            hidden: true
          metrics:
            total_revenue:
              type: sum
              label: "Revenue"
              format: "eur"
              round: 2
            avg_revenue_per_session:
              type: number
              label: "Revenue per session"
              sql: "SAFE_DIVIDE(${total_revenue}, ${total_sessions})"
              format: "eur"
              round: 2

      - name: page_views
        description: "Number of page views"
        meta:
          dimension:
            hidden: true
          metrics:
            total_page_views:
              type: sum
              label: "Page views"

      - name: transactions
        description: "Number of transactions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_transactions:
              type: sum
              label: "Transactions"
            conversion_rate:
              type: number
              label: "Conversion rate"
              sql: "SAFE_DIVIDE(${total_transactions}, ${total_sessions})"
              format: "percent"
              round: 2
            avg_order_value:
              type: number
              label: "Avg order value"
              sql: "SAFE_DIVIDE(${total_revenue}, ${total_transactions})"
              format: "eur"
              round: 2

      - name: add_to_cart_events
        description: "Number of add-to-cart events"
        meta:
          dimension:
            hidden: true
          metrics:
            total_add_to_cart:
              type: sum
              label: "Add to cart"

      - name: begin_checkout_events
        description: "Number of begin-checkout events"
        meta:
          dimension:
            hidden: true
          metrics:
            total_begin_checkout:
              type: sum
              label: "Begin checkout"

      - name: purchase_events
        description: "Number of purchase events"
        meta:
          dimension:
            hidden: true
          metrics:
            total_purchases:
              type: sum
              label: "Purchases"

  # ── GOOGLE ADS PERFORMANCE ─────────────────────────────────────────────────
  - name: mart_google_ads_performance
    description: "Google Ads campaign performance with calculated KPIs"
    meta:
      label: "Google Ads"
    columns:
      - name: report_date
        description: "Date of the report"
        meta:
          dimension:
            type: date
            label: "Date"

      - name: account_name
        description: "Google Ads account name"
        meta:
          dimension:
            type: string
            label: "Account"

      - name: campaign_name
        description: "Campaign name"
        meta:
          dimension:
            type: string
            label: "Campaign"

      - name: campaign_status
        description: "Campaign status (ENABLED, PAUSED, REMOVED)"
        meta:
          dimension:
            type: string
            label: "Status"

      - name: channel_type
        description: "Campaign type (SEARCH, SHOPPING, PERFORMANCE_MAX, DISPLAY)"
        meta:
          dimension:
            type: string
            label: "Campaign type"

      - name: device
        description: "Device (DESKTOP, MOBILE, TABLET)"
        meta:
          dimension:
            type: string
            label: "Device"

      - name: ad_network_type
        description: "Ad network (SEARCH, CONTENT)"
        meta:
          dimension:
            type: string
            label: "Network"

      - name: impressions
        description: "Number of impressions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_impressions:
              type: sum
              label: "Impressions"

      - name: clicks
        description: "Number of clicks"
        meta:
          dimension:
            hidden: true
          metrics:
            total_clicks:
              type: sum
              label: "Clicks"
            ctr:
              type: number
              label: "CTR"
              sql: "SAFE_DIVIDE(${total_clicks}, ${total_impressions})"
              format: "percent"
              round: 2

      - name: cost
        description: "Ad spend in EUR"
        meta:
          dimension:
            hidden: true
          metrics:
            total_cost:
              type: sum
              label: "Cost"
              format: "eur"
              round: 2
            cpc:
              type: number
              label: "CPC"
              sql: "SAFE_DIVIDE(${total_cost}, ${total_clicks})"
              format: "eur"
              round: 2

      - name: conversions
        description: "Number of conversions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_conversions:
              type: sum
              label: "Conversions"
            cost_per_conversion:
              type: number
              label: "Cost per conversion"
              sql: "SAFE_DIVIDE(${total_cost}, ${total_conversions})"
              format: "eur"
              round: 2

      - name: conversions_value
        description: "Total conversion value in EUR"
        meta:
          dimension:
            hidden: true
          metrics:
            total_conversion_value:
              type: sum
              label: "Conversion value"
              format: "eur"
              round: 2
            roas:
              type: number
              label: "ROAS"
              sql: "SAFE_DIVIDE(${total_conversion_value}, ${total_cost})"
              round: 2

  # ── SEO PERFORMANCE (site-level) ───────────────────────────────────────────
  - name: mart_seo_performance
    description: "Google Search Console site-level SEO performance"
    meta:
      label: "SEO Performance"
    columns:
      - name: data_date
        description: "Date"
        meta:
          dimension:
            type: date
            label: "Date"

      - name: site_url
        description: "Website URL"
        meta:
          dimension:
            type: string
            label: "Site URL"

      - name: query
        description: "Search query"
        meta:
          dimension:
            type: string
            label: "Query"

      - name: search_type
        description: "Search type (web, image, video)"
        meta:
          dimension:
            type: string
            label: "Search type"

      - name: impressions
        description: "Number of search impressions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_impressions:
              type: sum
              label: "Impressions"

      - name: clicks
        description: "Number of search clicks"
        meta:
          dimension:
            hidden: true
          metrics:
            total_clicks:
              type: sum
              label: "Clicks"
            ctr:
              type: number
              label: "CTR"
              sql: "SAFE_DIVIDE(${total_clicks}, ${total_impressions})"
              format: "percent"
              round: 2

      - name: sum_top_position
        description: "Sum of positions (for weighted average calculation)"
        meta:
          dimension:
            hidden: true
          metrics:
            total_sum_top_position:
              type: sum
              label: "Sum of positions"
              hidden: true
            avg_position:
              type: number
              label: "Avg position"
              sql: "SAFE_DIVIDE(${total_sum_top_position}, ${total_impressions})"
              round: 1

  # ── SEO PAGES (URL-level) ──────────────────────────────────────────────────
  - name: mart_seo_pages
    description: "Google Search Console page-level SEO performance"
    meta:
      label: "SEO Pages"
    columns:
      - name: data_date
        description: "Date"
        meta:
          dimension:
            type: date
            label: "Date"

      - name: url
        description: "Page URL"
        meta:
          dimension:
            type: string
            label: "URL"

      - name: query
        description: "Search query"
        meta:
          dimension:
            type: string
            label: "Query"

      - name: impressions
        description: "Number of impressions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_impressions:
              type: sum
              label: "Impressions"

      - name: clicks
        description: "Number of clicks"
        meta:
          dimension:
            hidden: true
          metrics:
            total_clicks:
              type: sum
              label: "Clicks"
            ctr:
              type: number
              label: "CTR"
              sql: "SAFE_DIVIDE(${total_clicks}, ${total_impressions})"
              format: "percent"
              round: 2

      - name: sum_top_position
        description: "Sum of positions"
        meta:
          dimension:
            hidden: true
          metrics:
            total_sum_top_position:
              type: sum
              hidden: true
            avg_position:
              type: number
              label: "Avg position"
              sql: "SAFE_DIVIDE(${total_sum_top_position}, ${total_impressions})"
              round: 1

      - name: is_organic_shopping
        description: "Appeared in organic shopping results"
        meta:
          dimension:
            type: boolean
            label: "Organic shopping"

      - name: is_product_snippets
        description: "Appeared as product snippet"
        meta:
          dimension:
            type: boolean
            label: "Product snippet"

      - name: is_merchant_listings
        description: "Appeared in merchant listings"
        meta:
          dimension:
            type: boolean
            label: "Merchant listing"

  # ── ECOMMERCE FUNNEL ──────────────────────────────────────────────────────
  - name: mart_ecommerce_funnel
    description: "Ecommerce conversion funnel by device and channel — use for funnel visualizations"
    meta:
      label: "Ecommerce Funnel"
    columns:
      - name: event_date
        description: "Date"
        meta:
          dimension:
            type: date
            label: "Date"

      - name: device_category
        description: "Device (desktop, mobile)"
        meta:
          dimension:
            type: string
            label: "Device"

      - name: channel_grouping
        description: "Traffic channel"
        meta:
          dimension:
            type: string
            label: "Channel"

      - name: sessions
        description: "Total sessions entering the funnel"
        meta:
          dimension:
            hidden: true
          metrics:
            total_sessions:
              type: sum
              label: "Sessions"

      - name: product_views
        description: "Sessions with a product view"
        meta:
          dimension:
            hidden: true
          metrics:
            total_product_views:
              type: sum
              label: "Product views"
            product_view_rate:
              type: number
              label: "Product view rate"
              sql: "SAFE_DIVIDE(${total_product_views}, ${total_sessions})"
              format: "percent"
              round: 1

      - name: add_to_cart
        description: "Sessions with add-to-cart"
        meta:
          dimension:
            hidden: true
          metrics:
            total_add_to_cart:
              type: sum
              label: "Add to cart"
            add_to_cart_rate:
              type: number
              label: "Add to cart rate"
              sql: "SAFE_DIVIDE(${total_add_to_cart}, ${total_sessions})"
              format: "percent"
              round: 1

      - name: begin_checkout
        description: "Sessions with begin checkout"
        meta:
          dimension:
            hidden: true
          metrics:
            total_begin_checkout:
              type: sum
              label: "Begin checkout"
            checkout_rate:
              type: number
              label: "Checkout rate"
              sql: "SAFE_DIVIDE(${total_begin_checkout}, ${total_add_to_cart})"
              format: "percent"
              round: 1

      - name: purchases
        description: "Completed purchases"
        meta:
          dimension:
            hidden: true
          metrics:
            total_purchases:
              type: sum
              label: "Purchases"
            purchase_completion_rate:
              type: number
              label: "Purchase completion rate"
              sql: "SAFE_DIVIDE(${total_purchases}, ${total_begin_checkout})"
              format: "percent"
              round: 1
            overall_conversion_rate:
              type: number
              label: "Overall conversion rate"
              sql: "SAFE_DIVIDE(${total_purchases}, ${total_sessions})"
              format: "percent"
              round: 2

      - name: revenue
        description: "Revenue in EUR"
        meta:
          dimension:
            hidden: true
          metrics:
            total_revenue:
              type: sum
              label: "Revenue"
              format: "eur"
              round: 2
            avg_order_value:
              type: number
              label: "Avg order value"
              sql: "SAFE_DIVIDE(${total_revenue}, ${total_purchases})"
              format: "eur"
              round: 2

  # ── CUSTOMER RETENTION ─────────────────────────────────────────────────────
  - name: mart_customer_retention
    description: "Monthly customer retention cohort analysis — use for retention heatmap and cohort charts"
    meta:
      label: "Customer Retention"
    columns:
      - name: cohort_month
        description: "Month of first purchase (YYYY-MM)"
        meta:
          dimension:
            type: string
            label: "Cohort month"

      - name: months_since_first_purchase
        description: "Months since first purchase (0 = acquisition month)"
        meta:
          dimension:
            type: number
            label: "Months since first purchase"

      - name: new_customers
        description: "Number of new customers in this cohort"
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customers:
              type: sum
              label: "New customers"

      - name: returning_customers
        description: "Number of customers who returned in this period"
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customers:
              type: sum
              label: "Returning customers"

      - name: retention_rate
        description: "Retention rate (returning / new customers)"
        meta:
          dimension:
            hidden: true
          metrics:
            avg_retention_rate:
              type: average
              label: "Retention rate"
              format: "percent"
              round: 1

      - name: cohort_revenue
        description: "Revenue generated by this cohort in this period"
        meta:
          dimension:
            hidden: true
          metrics:
            total_cohort_revenue:
              type: sum
              label: "Cohort revenue"
              format: "eur"
              round: 2
            avg_revenue_per_customer:
              type: number
              label: "Revenue per returning customer"
              sql: "SAFE_DIVIDE(${total_cohort_revenue}, ${total_returning_customers})"
              format: "eur"
              round: 2
