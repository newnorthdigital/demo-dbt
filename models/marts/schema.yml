version: 2

models:
  # ── ORDERS & REVENUE (Overview + Orders page) ──────────────────────────────
  - name: mart_orders_revenue
    description: "Daily orders, revenue, refunds, COGS, profit, and ad spend by channel"
    meta:
      label: "Orders & Revenue"
    columns:
      - name: order_date
        meta:
          dimension:
            type: date
            label: "Date"
      - name: channel
        meta:
          dimension:
            type: string
            label: "Channel"
      - name: sessions
        meta:
          dimension:
            hidden: true
          metrics:
            total_sessions:
              type: sum
              label: "Sessions"
      - name: orders
        meta:
          dimension:
            hidden: true
          metrics:
            total_orders:
              type: sum
              label: "Orders"
            conversion_rate:
              type: number
              label: "Conversion rate"
              sql: "SAFE_DIVIDE(${total_orders}, ${total_sessions})"
              format: "percent"
              round: 2
      - name: new_customer_orders
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customer_orders:
              type: sum
              label: "New customer orders"
            new_customer_rate:
              type: number
              label: "New customer rate"
              sql: "SAFE_DIVIDE(${total_new_customer_orders}, ${total_orders})"
              format: "percent"
              round: 1
      - name: returning_customer_orders
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customer_orders:
              type: sum
              label: "Returning customer orders"
            returning_rate:
              type: number
              label: "Returning rate"
              sql: "SAFE_DIVIDE(${total_returning_customer_orders}, ${total_orders})"
              format: "percent"
              round: 1
      - name: gross_revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_gross_revenue:
              type: sum
              label: "Gross revenue"
              format: "eur"
              round: 0
            avg_order_value:
              type: number
              label: "Avg order value"
              sql: "SAFE_DIVIDE(${total_gross_revenue}, ${total_orders})"
              format: "eur"
              round: 0
      - name: amount_refunded
        meta:
          dimension:
            hidden: true
          metrics:
            total_refunded:
              type: sum
              label: "Amount refunded"
              format: "eur"
              round: 0
      - name: net_revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_net_revenue:
              type: sum
              label: "Net revenue"
              format: "eur"
              round: 0
      - name: units_sold
        meta:
          dimension:
            hidden: true
          metrics:
            total_units_sold:
              type: sum
              label: "Units sold"
      - name: units_returned
        meta:
          dimension:
            hidden: true
          metrics:
            total_units_returned:
              type: sum
              label: "Units returned"
            return_rate:
              type: number
              label: "Return rate"
              sql: "SAFE_DIVIDE(${total_units_returned}, ${total_units_sold})"
              format: "percent"
              round: 1
      - name: cogs
        meta:
          dimension:
            hidden: true
          metrics:
            total_cogs:
              type: sum
              label: "COGS"
              format: "eur"
              round: 0
      - name: gross_profit
        meta:
          dimension:
            hidden: true
          metrics:
            total_gross_profit:
              type: sum
              label: "Gross profit"
              format: "eur"
              round: 0
            gross_margin:
              type: number
              label: "Gross margin"
              sql: "SAFE_DIVIDE(${total_gross_profit}, ${total_net_revenue})"
              format: "percent"
              round: 1
            net_profit:
              type: number
              label: "Net profit"
              sql: "${total_gross_profit} - ${total_ad_spend}"
              format: "eur"
              round: 0
      - name: ad_spend
        meta:
          dimension:
            hidden: true
          metrics:
            total_ad_spend:
              type: sum
              label: "Ad spend"
              format: "eur"
              round: 0
            blended_roas:
              type: number
              label: "Blended ROAS"
              sql: "SAFE_DIVIDE(${total_gross_revenue}, ${total_ad_spend})"
              round: 1
            blended_poas:
              type: number
              label: "Blended POAS"
              sql: "SAFE_DIVIDE(${total_gross_profit}, ${total_ad_spend})"
              round: 1
            blended_cac:
              type: number
              label: "Blended CAC"
              sql: "SAFE_DIVIDE(${total_ad_spend}, ${total_new_customer_orders})"
              format: "eur"
              round: 0
            mer:
              type: number
              label: "MER"
              sql: "SAFE_DIVIDE(${total_gross_revenue}, ${total_ad_spend})"
              round: 1
            cpa:
              type: number
              label: "CPA"
              sql: "SAFE_DIVIDE(${total_ad_spend}, ${total_orders})"
              format: "eur"
              round: 0

  # ── PRODUCT PERFORMANCE ────────────────────────────────────────────────────
  - name: mart_product_performance
    description: "Product and category-level performance with revenue, returns, COGS, and margin"
    meta:
      label: "Products & Categories"
    columns:
      - name: order_date
        meta:
          dimension:
            type: date
            label: "Date"
      - name: product_name
        meta:
          dimension:
            type: string
            label: "Product"
      - name: category
        meta:
          dimension:
            type: string
            label: "Category"
      - name: item_price
        meta:
          dimension:
            hidden: true
          metrics:
            avg_item_price:
              type: average
              label: "Avg item price"
              format: "eur"
              round: 0
      - name: units_sold
        meta:
          dimension:
            hidden: true
          metrics:
            total_units_sold:
              type: sum
              label: "Units sold"
      - name: revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_revenue:
              type: sum
              label: "Revenue"
              format: "eur"
              round: 0
      - name: units_returned
        meta:
          dimension:
            hidden: true
          metrics:
            total_units_returned:
              type: sum
              label: "Units returned"
            return_rate:
              type: number
              label: "Return rate"
              sql: "SAFE_DIVIDE(${total_units_returned}, ${total_units_sold})"
              format: "percent"
              round: 1
      - name: refund_amount
        meta:
          dimension:
            hidden: true
          metrics:
            total_refunded:
              type: sum
              label: "Refunds"
              format: "eur"
              round: 0
      - name: cogs
        meta:
          dimension:
            hidden: true
          metrics:
            total_cogs:
              type: sum
              label: "COGS"
              format: "eur"
              round: 0
      - name: margin
        meta:
          dimension:
            hidden: true
          metrics:
            total_margin:
              type: sum
              label: "Margin"
              format: "eur"
              round: 0
            margin_pct:
              type: number
              label: "Margin %"
              sql: "SAFE_DIVIDE(${total_margin}, ${total_revenue})"
              format: "percent"
              round: 1
      - name: repeat_order_pct
        meta:
          dimension:
            hidden: true
          metrics:
            avg_repeat_order_pct:
              type: average
              label: "Repeat order %"
              format: "percent"
              round: 0

  # ── CUSTOMERS & TRAFFIC ────────────────────────────────────────────────────
  - name: mart_customers
    description: "Daily new vs returning customer metrics, CLV, and AOV breakdown"
    meta:
      label: "Customers & Traffic"
    columns:
      - name: order_date
        meta:
          dimension:
            type: date
            label: "Date"
      - name: new_customers
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customers:
              type: sum
              label: "New customers"
      - name: returning_customers
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customers:
              type: sum
              label: "Returning customers"
      - name: total_customers
        meta:
          dimension:
            hidden: true
          metrics:
            sum_total_customers:
              type: sum
              label: "Total customers"
            returning_customer_pct:
              type: number
              label: "Returning customer %"
              sql: "SAFE_DIVIDE(${total_returning_customers}, ${sum_total_customers})"
              format: "percent"
              round: 1
      - name: new_customer_revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customer_revenue:
              type: sum
              label: "New customer revenue"
              format: "eur"
              round: 0
            new_customer_revenue_pct:
              type: number
              label: "New cust. rev %"
              sql: "SAFE_DIVIDE(${total_new_customer_revenue}, ${total_new_customer_revenue} + ${total_returning_customer_revenue})"
              format: "percent"
              round: 1
      - name: returning_customer_revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customer_revenue:
              type: sum
              label: "Returning customer revenue"
              format: "eur"
              round: 0
            returning_customer_revenue_pct:
              type: number
              label: "Return cust. rev %"
              sql: "SAFE_DIVIDE(${total_returning_customer_revenue}, ${total_new_customer_revenue} + ${total_returning_customer_revenue})"
              format: "percent"
              round: 1
      - name: new_customer_aov
        meta:
          dimension:
            hidden: true
          metrics:
            avg_new_customer_aov:
              type: average
              label: "New customer AOV"
              format: "eur"
              round: 0
      - name: returning_customer_aov
        meta:
          dimension:
            hidden: true
          metrics:
            avg_returning_customer_aov:
              type: average
              label: "Returning customer AOV"
              format: "eur"
              round: 0
      - name: new_customer_items
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customer_items:
              type: sum
              label: "New customer items"
      - name: returning_customer_items
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customer_items:
              type: sum
              label: "Returning customer items"
            avg_items_per_order:
              type: number
              label: "Avg items per order"
              sql: "SAFE_DIVIDE(${total_new_customer_items} + ${total_returning_customer_items}, ${sum_total_customers})"
              round: 1
      - name: customer_lifetime_value
        meta:
          dimension:
            hidden: true
          metrics:
            avg_clv:
              type: average
              label: "Customer lifetime value"
              format: "eur"
              round: 0

  # ── ECOMMERCE FUNNEL ──────────────────────────────────────────────────────
  - name: mart_ecommerce_funnel
    description: "Ecommerce conversion funnel by device and channel"
    meta:
      label: "Ecommerce Funnel"
    columns:
      - name: event_date
        meta:
          dimension:
            type: date
            label: "Date"
      - name: device_category
        meta:
          dimension:
            type: string
            label: "Device"
      - name: channel_grouping
        meta:
          dimension:
            type: string
            label: "Channel"
      - name: sessions
        meta:
          dimension:
            hidden: true
          metrics:
            total_sessions:
              type: sum
              label: "Sessions"
      - name: product_views
        meta:
          dimension:
            hidden: true
          metrics:
            total_product_views:
              type: sum
              label: "Product views"
            product_view_rate:
              type: number
              label: "Product view rate"
              sql: "SAFE_DIVIDE(${total_product_views}, ${total_sessions})"
              format: "percent"
              round: 1
      - name: add_to_cart
        meta:
          dimension:
            hidden: true
          metrics:
            total_add_to_cart:
              type: sum
              label: "Add to cart"
            add_to_cart_rate:
              type: number
              label: "Add to cart rate"
              sql: "SAFE_DIVIDE(${total_add_to_cart}, ${total_sessions})"
              format: "percent"
              round: 1
      - name: begin_checkout
        meta:
          dimension:
            hidden: true
          metrics:
            total_begin_checkout:
              type: sum
              label: "Begin checkout"
      - name: purchases
        meta:
          dimension:
            hidden: true
          metrics:
            total_purchases:
              type: sum
              label: "Purchases"
            overall_conversion_rate:
              type: number
              label: "Conversion rate"
              sql: "SAFE_DIVIDE(${total_purchases}, ${total_sessions})"
              format: "percent"
              round: 2
      - name: revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_revenue:
              type: sum
              label: "Revenue"
              format: "eur"
              round: 0

  # ── CUSTOMER RETENTION ─────────────────────────────────────────────────────
  - name: mart_customer_retention
    description: "Monthly customer retention cohort analysis"
    meta:
      label: "Customer Retention"
    columns:
      - name: cohort_month
        meta:
          dimension:
            type: string
            label: "Cohort month"
      - name: months_since_first_purchase
        meta:
          dimension:
            type: number
            label: "Months since first purchase"
      - name: new_customers
        meta:
          dimension:
            hidden: true
          metrics:
            total_new_customers:
              type: sum
              label: "New customers"
      - name: returning_customers
        meta:
          dimension:
            hidden: true
          metrics:
            total_returning_customers:
              type: sum
              label: "Returning customers"
      - name: retention_rate
        meta:
          dimension:
            hidden: true
          metrics:
            avg_retention_rate:
              type: average
              label: "Retention rate"
              format: "percent"
              round: 1
      - name: cohort_revenue
        meta:
          dimension:
            hidden: true
          metrics:
            total_cohort_revenue:
              type: sum
              label: "Cohort revenue"
              format: "eur"
              round: 0

  # ── SEO PERFORMANCE ────────────────────────────────────────────────────────
  - name: mart_seo_performance
    description: "Google Search Console site-level SEO performance"
    meta:
      label: "SEO Performance"
    columns:
      - name: data_date
        meta:
          dimension:
            type: date
            label: "Date"
      - name: site_url
        meta:
          dimension:
            type: string
            label: "Site URL"
      - name: query
        meta:
          dimension:
            type: string
            label: "Query"
      - name: search_type
        meta:
          dimension:
            type: string
            label: "Search type"
      - name: impressions
        meta:
          dimension:
            hidden: true
          metrics:
            total_impressions:
              type: sum
              label: "Impressions"
      - name: clicks
        meta:
          dimension:
            hidden: true
          metrics:
            total_clicks:
              type: sum
              label: "Clicks"
            ctr:
              type: number
              label: "CTR"
              sql: "SAFE_DIVIDE(${total_clicks}, ${total_impressions})"
              format: "percent"
              round: 2
      - name: sum_top_position
        meta:
          dimension:
            hidden: true
          metrics:
            total_sum_top_position:
              type: sum
              hidden: true
            avg_position:
              type: number
              label: "Avg position"
              sql: "SAFE_DIVIDE(${total_sum_top_position}, ${total_impressions})"
              round: 1
